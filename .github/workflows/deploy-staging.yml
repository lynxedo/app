name: Deploy to Staging
on:
  push:
    branches: [develop]
# Serialize deploys. Without this, rapid back-to-back pushes start parallel
# deploys that race on the VPS — one deploy's pm2 start can run against
# another deploy's still-building .next/, crashing the service.
concurrency:
  group: deploy-staging
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging.lynxedo.com
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          # Hardened deploy — see Website/CLAUDE.md "Deploy Failure Recovery"
          # for the lessons that drove this script. Critical properties:
          # 1. set -euo pipefail aborts the script the instant anything fails,
          #    so a broken tsc / build never reaches the pm2 step.
          # 2. tsc --noEmit runs BEFORE build. Type errors are surfaced fast
          #    (~15s) without the 60-90s build overhead, and the GitHub Actions
          #    log shows the exact file+line that broke.
          # 3. pm2 reload (cluster_mode) = zero-downtime: new worker starts and
          #    serves requests before the old one drains and exits. The script
          #    auto-migrates from fork to cluster_mode on first deploy (one
          #    brief restart); thereafter every deploy is zero-downtime.
          #    Falls back to pm2 restart if reload fails (e.g. errored process).
          # 4. Health check via curl --fail. If the app doesn't respond HTTP 200
          #    within 30s, dump the last 30 lines of pm2 stderr and exit
          #    non-zero so GitHub Actions turns the deploy red.
          # Result: a broken commit keeps the OLD build running and the GH
          # Actions step goes red. Staging never enters the restart-loop
          # zombie state we used to recover from manually.
          script: |
            set -euo pipefail
            cd /opt/lynxedo-staging/app
            git pull origin develop
            npm ci --legacy-peer-deps
            echo "==> Lint (non-blocking — informational only, never gates the deploy)"
            npx eslint . || echo "::warning::ESLint reported issues (non-blocking) — see output above"
            echo "==> Clearing stale generated route types (so pre-build tsc never trips on a deleted/renamed route)"
            rm -rf .next/types
            echo "==> Type-checking before build (fast-fail)"
            npx tsc --noEmit
            echo "==> IN5 zero-downtime build — build a CLEAN tree into a SIDE dir (.next-build)"
            echo "    so the live .next keeps serving during the ~2-4min build. If the build"
            echo "    fails, .next is never touched and the old build keeps running (set -e"
            echo "    aborts before the swap). A clean side dir also avoids the stale-manifest"
            echo "    bug that a wiped-then-rebuilt-in-place .next caused (/hub 500 2026-06-02)."
            rm -rf .next-build .next-old
            NEXT_DIST_DIR=.next-build npm run build
            echo "==> Atomic swap (sub-second): retire the live .next, promote the fresh build"
            mv .next .next-old 2>/dev/null || true
            mv .next-build .next
            echo "==> PM2 reload (zero-downtime graceful handoff)"
            # cluster_mode + pm2 reload: new worker starts and serves requests,
            # then old worker drains and exits — no gap in service.
            # Auto-migrates from fork to cluster_mode on first deploy after
            # ecosystem.config.js was added (one brief restart; zero-downtime forever after).
            if pm2 describe lynxedo-staging 2>/dev/null | grep -q "cluster_mode"; then
              echo "  cluster_mode confirmed — graceful reload"
              pm2 reload lynxedo-staging --update-env || pm2 restart lynxedo-staging --update-env
            else
              echo "  Migrating to cluster_mode (one-time; future deploys are zero-downtime)"
              pm2 delete lynxedo-staging 2>/dev/null || true
              pm2 start ecosystem.config.js --only lynxedo-staging
              pm2 save
            fi
            echo "==> Cleanup previous build dir (new .next is live + reloaded)"
            rm -rf .next-old
            echo "==> Health check (up to 60s for cold start)"
            for i in $(seq 1 60); do
              if curl --fail --silent --max-time 3 http://localhost:3002/ > /dev/null 2>&1 \
                 || curl --silent --max-time 3 -o /dev/null -w "%{http_code}" http://localhost:3002/ | grep -qE "^(200|307|308)$"; then
                echo "Healthy after ${i}s"
                exit 0
              fi
              sleep 1
            done
            echo "Health check failed after 60s — dumping recent stderr:"
            pm2 logs lynxedo-staging --lines 30 --nostream --err || true
            exit 1
