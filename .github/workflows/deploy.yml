name: Deploy to VPS
on:
  push:
    branches: [main]
# Serialize deploys. Without this, rapid back-to-back pushes start parallel
# deploys that race against each other on the VPS — one deploy's pm2 start
# can run against another deploy's still-building .next, crashing the
# service. cancel-in-progress is false so every commit still deploys; they
# just queue one at a time.
concurrency:
  group: deploy-vps
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/lynxedo/app
            git pull origin main
            npm install --legacy-peer-deps
            pm2 stop lynxedo
            npm run build
            pm2 start lynxedo --update-env
